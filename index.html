<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>
    <!-- Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para funcionar direto no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { 
                background: white !important; 
            }
            .no-print { 
                display: none !important; 
            }
            .print-area {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 1.5cm !important;
                width: 100% !important;
                max-width: none !important;
            }
        }

        .official-doc-font {
            font-family: Arial, sans-serif;
        }

        /* Estilo para legendas abaixo da linha */
        .line-label-below {
            font-size: 10pt;
            font-weight: bold;
            text-align: center;
            display: block;
            margin-top: 4px;
        }

        /* Brasão aumentado e proporcional */
        .crest-container {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .crest-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .file-input-hidden {
            display: none;
        }

        /* Forçar campos na mesma linha sem quebra */
        .info-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            width: 100%;
            gap: 12px;
            white-space: nowrap;
        }
        
        .signature-block {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            width: 100%;
        }

        .date-input-container {
            width: 180px;
            text-align: center;
        }

        .sign-line-container {
            flex-grow: 1;
        }

        .custom-line {
            border-bottom: 1.5px solid black;
            padding-bottom: 0px;
            min-height: 32px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-weight: bold;
            line-height: 1;
        }

        /* Estrutura para data tocando a linha única */
        .date-slots-underlined {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            font-weight: bold;
            min-height: 32px;
            border-bottom: 1.5px solid black; 
            padding-bottom: 0px; 
        }

        .date-slot-item {
            min-width: 32px;
            text-align: center;
            line-height: 1; 
        }

        .date-slot-year {
            min-width: 48px;
            text-align: center;
            line-height: 1;
        }

        .date-separator {
            font-size: 1.2rem;
            line-height: 1; 
            padding: 0 2px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const getTodayISODate = () => {
                const now = new Date();
                return now.toISOString().split('T')[0];
            };

            const [logo, setLogo] = useState('./brasao.png');
            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                turma: '',
                turno: '',
                anoLetivo: new Date().getFullYear().toString(),
                dataRequerimento: getTodayISODate(),
                dataRecebido: '',
            });

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleLogoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogo(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePrint = () => {
                window.print();
            };

            const formatDateForDoc = (isoDate) => {
                if (!isoDate) return "";
                const [year, month, day] = isoDate.split('-');
                return `${day}/${month}/${year}`;
            };

            const renderDateSlots = (isoDate) => {
                const dateString = formatDateForDoc(isoDate);
                const parts = dateString ? dateString.split('/') : ["", "", ""];
                const day = parts[0] || '';
                const month = parts[1] || '';
                const year = parts[2] || '';

                return (
                    <div className="date-slots-underlined">
                        <div className="date-slot-item">{day}</div>
                        <span className="date-separator">/</span>
                        <div className="date-slot-item">{month}</div>
                        <span className="date-separator">/</span>
                        <div className="date-slot-year">{year}</div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    {/* Painel lateral de preenchimento */}
                    <div className="no-print w-full lg:w-[400px] bg-white border-r border-slate-300 p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-8 text-blue-900 border-b pb-4">
                            <i data-lucide="calendar"></i>
                            <h1 className="text-xl font-bold uppercase tracking-tight">Preenchimento</h1>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Nome Completo do Aluno</label>
                                <input 
                                    name="nomeAluno" 
                                    className="w-full p-2 border-2 border-slate-200 rounded focus:border-blue-500 outline-none uppercase font-semibold text-sm"
                                    onChange={handleChange}
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ano</label>
                                    <input name="ano" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: 2º Ano" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turma</label>
                                    <input name="turma" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: B" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turno</label>
                                    <input name="turno" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: Matutino" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ano Letivo</label>
                                    <input name="anoLetivo" className="w-full p-2 border-2 border-slate-200 rounded text-sm" value={formData.anoLetivo} onChange={handleChange} />
                                </div>
                            </div>

                            <div className="pt-4 border-t border-slate-100">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Data do Requerimento</label>
                                <input 
                                    type="date"
                                    name="dataRequerimento" 
                                    className="w-full p-2 border-2 border-slate-200 rounded text-sm cursor-pointer" 
                                    value={formData.dataRequerimento} 
                                    onChange={handleChange} 
                                />
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Data do Recebimento</label>
                                <input 
                                    type="date"
                                    name="dataRecebido" 
                                    className="w-full p-2 border-2 border-slate-200 rounded text-sm cursor-pointer" 
                                    value={formData.dataRecebido} 
                                    onChange={handleChange} 
                                />
                            </div>

                            <button 
                                onClick={handlePrint}
                                className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 mt-4"
                            >
                                <i data-lucide="printer"></i>
                                IMPRIMIR REQUERIMENTO
                            </button>

                            <div className="pt-6 border-t mt-6">
                                <label className="flex items-center gap-2 text-xs text-blue-600 cursor-pointer hover:underline">
                                    <i data-lucide="image" size="14"></i>
                                    Alterar brasão temporariamente
                                    <input type="file" accept="image/*" className="file-input-hidden" onChange={handleLogoChange} />
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* Área do Documento - Ajustada para subir o conteúdo */}
                    <div className="flex-1 flex justify-center p-4 lg:p-10 overflow-y-auto bg-slate-200 print:bg-white print:p-0">
                        <div className="print-area bg-white w-full max-w-[21cm] min-h-[29.7cm] shadow-2xl p-[1.5cm] lg:p-[2.5cm] text-black official-doc-font box-border">
                            
                            {/* Cabeçalho - Espaçamento reduzido de mb-12 para mb-8 */}
                            <div className="flex items-center justify-start gap-8 mb-8">
                                <div className="crest-container shrink-0">
                                    <img 
                                        src={logo} 
                                        alt="Brasão" 
                                        className="crest-img" 
                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/120?text=BRASÃO'; }}
                                    />
                                </div>
                                <div className="text-[16pt] font-bold leading-tight uppercase text-left">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            {/* Títulos - Espaçamento reduzido de mb-10 para mb-6 */}
                            <div className="text-center mb-6">
                                <h1 className="text-[26pt] font-bold italic mb-4">Requerimento de Transferência</h1>
                                <h2 className="text-[13pt] font-normal uppercase tracking-widest mt-2">
                                    Escola Municipal Walda Miranda de Paiva
                                </h2>
                            </div>

                            {/* Nome do Aluno - Espaçamento reduzido mt-14 para mt-6 e mb-10 para mb-6 */}
                            <div className="mb-6 mt-6">
                                <div className="custom-line w-full text-[14pt] uppercase">
                                    {formData.nomeAluno}
                                </div>
                                <span className="line-label-below uppercase">Nome do Aluno</span>
                            </div>

                            {/* Informações Escolares - mb-10 para mb-6 */}
                            <div className="info-row mb-6 text-[11pt]">
                                <div className="flex items-baseline shrink-0">
                                    <span className="mr-1">Ano:</span>
                                    <div className="border-b border-black w-[80px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.ano}
                                    </div>
                                </div>
                                <div className="flex items-baseline shrink-0">
                                    <span className="mr-1">Série:</span>
                                    <div className="border-b border-black w-[80px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {" "}
                                    </div>
                                </div>
                                <div className="flex items-baseline shrink-0">
                                    <span className="mr-1">Turma:</span>
                                    <div className="border-b border-black w-[60px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.turma}
                                    </div>
                                </div>
                                <div className="flex items-baseline min-w-[160px]">
                                    <span className="mr-1">Turno:</span>
                                    <div className="border-b border-black flex-grow text-center font-bold uppercase px-1 min-h-[1.2rem]">
                                        {formData.turno}
                                    </div>
                                </div>
                                <div className="flex items-baseline shrink-0">
                                    <span className="mr-1">Ano Letivo:</span>
                                    <div className="border-b border-black w-[90px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.anoLetivo}
                                    </div>
                                </div>
                            </div>

                            {/* Professor(a) - Espaçamento mb-16 para mb-10 */}
                            <div className="flex items-baseline mb-10 text-[12pt]">
                                <span className="mr-2 whitespace-nowrap">Prof. (a):</span>
                                <div className="border-b border-black flex-grow font-bold px-2 uppercase min-h-[1.4rem] text-center">
                                </div>
                            </div>

                            {/* Mensagem Central - my-20 para my-10 */}
                            <div className="text-center font-bold text-[18pt] my-10 uppercase tracking-wide">
                                Requer sua Transferência
                            </div>

                            {/* Seção de Assinaturas - space-y-16 para space-y-10 */}
                            <div className="space-y-10">
                                {/* Primeira Assinatura */}
                                <div className="signature-block">
                                    <div className="date-input-container">
                                        {renderDateSlots(formData.dataRequerimento)}
                                        <span className="line-label-below uppercase">Data</span>
                                    </div>
                                    <div className="sign-line-container">
                                        <div className="custom-line"></div>
                                        <span className="line-label-below uppercase">Assinatura do Aluno ou Responsável</span>
                                    </div>
                                </div>

                                {/* Segunda Assinatura */}
                                <div className="signature-block">
                                    <div className="date-input-container">
                                        {renderDateSlots(formData.dataRecebido)}
                                        <span className="line-label-below uppercase">Data</span>
                                    </div>
                                    <div className="sign-line-container">
                                        <div className="custom-line"></div>
                                        <span className="line-label-below uppercase">Recebi a Documentação</span>
                                    </div>
                                </div>

                                {/* Deferimento Final */}
                                <div className="mt-12">
                                    <div className="border-b-2 border-black w-full h-8"></div>
                                    <span className="line-label-below uppercase text-[12pt]">Deferimento do Diretor / Secretário</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
