<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>
    <!-- Tailwind CSS para o painel de controle -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            /* DEFINIÇÕES DE MEDIDAS - VOCÊ PODE ME PASSAR ESSES VALORES */
            --doc-margin-top: 1.5cm;
            --doc-margin-bottom: 1.5cm;
            --doc-margin-left: 2cm;
            --doc-margin-right: 2cm;
            --font-size-labels: 14pt;
            --font-size-titles: 26pt;
            --font-size-subtitles: 13pt;
            --line-height-fields: 32px;
        }

        body { font-family: 'Inter', sans-serif; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-area {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: var(--doc-margin-top) var(--doc-margin-right) var(--doc-margin-bottom) var(--doc-margin-left) !important;
                width: 100% !important;
                max-width: none !important;
                height: 100vh;
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
            }
        }

        .official-doc-font { font-family: Arial, sans-serif; }

        /* Estilos de fonte configurados */
        .label-14 { font-size: var(--font-size-labels); font-weight: normal; text-transform: uppercase; }
        .data-text-14 { font-size: var(--font-size-labels); font-weight: bold; text-transform: uppercase; }
        
        .line-under { border-bottom: 1px solid black; min-height: var(--line-height-fields); display: flex; align-items: flex-end; }
        
        .crest-container { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .crest-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .signature-block { display: flex; align-items: flex-start; gap: 15px; width: 100%; }
        .date-side-wrapper { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; padding-top: 10px; }
        .sign-line-container { flex-grow: 1; padding-top: 10px; }

        .date-slots-underlined {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-size: var(--font-size-labels);
            min-height: var(--line-height-fields);
            border-bottom: 1px solid black;
            min-width: 160px;
        }

        .director-sign-img { max-height: 50px; object-fit: contain; margin-bottom: -18px; }

        .suggestions-list {
            max-height: 250px;
            overflow-y: auto;
            position: absolute;
            width: 100%;
            z-index: 50;
            background: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const getTodayISODate = () => new Date().toISOString().split('T')[0];

            const [csvData, setCsvData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [loadStatus, setLoadStatus] = useState('idle');
            
            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                turma: '',
                turno: '',
                anoLetivo: new Date().getFullYear().toString(),
                dataRequerimento: getTodayISODate(),
                dataRecebido: '',
            });

            useEffect(() => {
                const autoFetchCsv = async () => {
                    setLoadStatus('loading');
                    try {
                        const response = await fetch('./CUBO.CSV');
                        if (response.ok) {
                            const text = await response.text();
                            parseCsv(text);
                            setLoadStatus('success');
                        } else { setLoadStatus('error'); }
                    } catch (err) { setLoadStatus('error'); }
                };
                autoFetchCsv();
            }, []);

            const parseCsv = (text) => {
                const lines = text.split(/\r?\n/);
                const result = [];
                const startIdx = lines[0].toLowerCase().includes('aluno') ? 1 : 0;
                for (let i = startIdx; i < lines.length; i++) {
                    if (lines[i].trim() === "") continue;
                    const columns = lines[i].split(';');
                    if (columns.length >= 4) {
                        result.push({
                            nome: columns[0].trim().toUpperCase(),
                            ano: columns[1].trim(),
                            turma: columns[2].trim(),
                            turno: columns[3].trim()
                        });
                    }
                }
                setCsvData(result);
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
                if (name === 'nomeAluno') {
                    setSearchTerm(value);
                    setShowSuggestions(true);
                }
            };

            const selectStudent = (student) => {
                setFormData({
                    ...formData,
                    nomeAluno: student.nome,
                    ano: student.ano,
                    turma: student.turma,
                    turno: student.turno
                });
                setSearchTerm(student.nome);
                setShowSuggestions(false);
            };

            const renderDateSlots = (isoDate) => {
                if (!isoDate) return (
                    <div className="date-slots-underlined">
                        <div className="w-8 text-center">&nbsp;</div>/
                        <div className="w-8 text-center">&nbsp;</div>/
                        <div className="w-12 text-center">&nbsp;</div>
                    </div>
                );
                const [y, m, d] = isoDate.split('-');
                return (
                    <div className="date-slots-underlined">
                        <div className="w-8 text-center">{d}</div>/
                        <div className="w-8 text-center">{m}</div>/
                        <div className="w-12 text-center">{y}</div>
                    </div>
                );
            };

            const filteredStudents = csvData.filter(s => 
                s.nome.toLowerCase().includes(searchTerm.toLowerCase())
            ).slice(0, 15);

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    {/* Painel de Controle */}
                    <div className="no-print w-full lg:w-[400px] bg-white border-r p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-6 text-blue-900 border-b pb-4">
                            <i data-lucide="settings"></i>
                            <h1 className="text-xl font-bold uppercase">Controle</h1>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="relative">
                                <label className="block text-xs font-bold text-gray-500 uppercase">Buscar Aluno</label>
                                <input 
                                    name="nomeAluno" 
                                    className="w-full p-2 border-2 rounded uppercase font-semibold text-sm"
                                    value={formData.nomeAluno}
                                    onChange={handleChange}
                                    autoComplete="off"
                                />
                                {showSuggestions && searchTerm && csvData.length > 0 && (
                                    <div className="suggestions-list">
                                        {filteredStudents.map((s, idx) => (
                                            <div key={idx} className="p-3 hover:bg-blue-600 hover:text-white cursor-pointer border-b text-sm font-bold uppercase" onClick={() => selectStudent(s)}>
                                                {s.nome}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-bold text-gray-500">ANO</label><input name="ano" className="w-full p-2 border-2 rounded" value={formData.ano} onChange={handleChange} /></div>
                                <div><label className="text-xs font-bold text-gray-500">TURMA</label><input name="turma" className="w-full p-2 border-2 rounded" value={formData.turma} onChange={handleChange} /></div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-bold text-gray-500">TURNO</label><input name="turno" className="w-full p-2 border-2 rounded uppercase" value={formData.turno} onChange={handleChange} /></div>
                                <div><label className="text-xs font-bold text-gray-500">ANO LETIVO</label><input name="anoLetivo" className="w-full p-2 border-2 rounded" value={formData.anoLetivo} onChange={handleChange} /></div>
                            </div>

                            <div className="grid grid-cols-1 gap-4 pt-4 border-t">
                                <div><label className="text-xs font-bold text-gray-500">DATA REQUERIMENTO</label><input type="date" name="dataRequerimento" className="w-full p-2 border-2 rounded" value={formData.dataRequerimento} onChange={handleChange} /></div>
                                <div><label className="text-xs font-bold text-gray-500">DATA RECEBIDO</label><input type="date" name="dataRecebido" className="w-full p-2 border-2 rounded" value={formData.dataRecebido} onChange={handleChange} /></div>
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg mt-4">
                                <i data-lucide="printer"></i> IMPRIMIR
                            </button>
                        </div>
                    </div>

                    {/* Documento */}
                    <div className="flex-1 flex justify-center p-4 lg:p-10 bg-slate-200 print:bg-white print:p-0">
                        <div className="print-area bg-white w-full max-w-[21cm] min-h-[29.7cm] shadow-2xl text-black official-doc-font box-border flex flex-col">
                            
                            <div className="flex items-center justify-start gap-8 mb-8">
                                <div className="crest-container shrink-0">
                                    <img src="./brasao.png" alt="Brasão" className="crest-img" onError={(e) => { e.target.src = 'https://via.placeholder.com/120?text=BRASÃO'; }} />
                                </div>
                                <div className="text-[14pt] font-bold leading-tight uppercase">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            <div className="text-center mb-6">
                                <h1 className="text-[26pt] font-bold italic mb-4">Requerimento de Transferência</h1>
                                <h2 className="text-[13pt] font-normal uppercase tracking-widest">Escola Municipal Walda Miranda de Paiva</h2>
                            </div>

                            <div className="mb-6 mt-10">
                                <div className="line-under w-full data-text-14 justify-center">{formData.nomeAluno}</div>
                                <span className="label-14 text-center block mt-1">Nome do Aluno</span>
                            </div>

                            <div className="flex justify-between items-baseline mb-10 label-14">
                                <div className="flex items-baseline">Ano: <div className="border-b border-black w-24 text-center font-bold px-1 ml-1">{formData.ano}</div></div>
                                <div className="flex items-baseline">Turma: <div className="border-b border-black w-20 text-center font-bold px-1 ml-1">{formData.turma}</div></div>
                                <div className="flex items-baseline">Turno: <div className="border-b border-black w-32 text-center font-bold px-1 ml-1">{formData.turno}</div></div>
                                <div className="flex items-baseline">Ano Letivo: <div className="border-b border-black w-28 text-center font-bold px-1 ml-1">{formData.anoLetivo}</div></div>
                            </div>

                            <div className="text-center font-bold text-[18pt] my-16 uppercase tracking-wide">
                                Requer sua Transferência
                            </div>

                            <div className="space-y-12 flex-grow">
                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="label-14 whitespace-nowrap">Data:</span>
                                        {renderDateSlots(formData.dataRequerimento)}
                                    </div>
                                    <div className="sign-line-container">
                                        <div className="line-under"></div>
                                        <span className="label-14 text-center block mt-1">Assinatura do Aluno ou Responsável</span>
                                    </div>
                                </div>

                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="label-14 whitespace-nowrap">Data:</span>
                                        {renderDateSlots(formData.dataRecebido)}
                                    </div>
                                    <div className="sign-line-container">
                                        <div className="line-under"></div>
                                        <span className="label-14 text-center block mt-1">Recebi a Documentação</span>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-auto pt-10 pb-10 flex flex-col items-center">
                                <img src="./assinatura.png" alt="Assinatura" className="director-sign-img" onError={(e) => { e.target.style.display = 'none'; }} />
                                <div className="border-b border-black w-full h-8"></div>
                                <span className="label-14 text-center block mt-1" style={{fontSize: '12pt'}}>Deferimento do Diretor / Secretário</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
