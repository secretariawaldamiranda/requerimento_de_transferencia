<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>
    <!-- Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para funcionar direto no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { 
                background: white !important; 
            }
            .no-print { 
                display: none !important; 
            }
            .print-area {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 1.5cm !important;
                width: 100% !important;
                max-width: none !important;
            }
        }

        .official-doc-font {
            font-family: Arial, sans-serif;
        }

        /* Estilo para legendas abaixo da linha */
        .line-label-below {
            font-size: 10pt;
            font-weight: bold;
            text-align: center;
            display: block;
            margin-top: 2px;
        }

        .crest-container {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .crest-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .file-input-hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Brasão fixo conforme solicitado (brasao.png na mesma pasta)
            const [logo, setLogo] = useState('./brasao.png');
            
            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                turma: '',
                turno: '',
                anoLetivo: new Date().getFullYear().toString(),
                professor: '',
            });

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleLogoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogo(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePrint = () => {
                window.print();
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    {/* Painel lateral de preenchimento (Oculto na Impressão) */}
                    <div className="no-print w-full lg:w-[400px] bg-white border-r border-slate-300 p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-8 text-blue-900 border-b pb-4">
                            <i data-lucide="file-edit"></i>
                            <h1 className="text-xl font-bold uppercase tracking-tight">Preenchimento</h1>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Nome Completo do Aluno</label>
                                <input 
                                    name="nomeAluno" 
                                    className="w-full p-2 border-2 border-slate-200 rounded focus:border-blue-500 outline-none uppercase font-semibold text-sm"
                                    onChange={handleChange}
                                    placeholder="Ex: JOÃO DA SILVA"
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ano</label>
                                    <input name="ano" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: 2º Ano" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turma</label>
                                    <input name="turma" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: B" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turno</label>
                                    <input name="turno" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: Matutino" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ano Letivo</label>
                                    <input name="anoLetivo" className="w-full p-2 border-2 border-slate-200 rounded text-sm" value={formData.anoLetivo} onChange={handleChange} />
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Professor(a)</label>
                                <input name="professor" className="w-full p-2 border-2 border-slate-200 rounded text-sm uppercase" onChange={handleChange} />
                            </div>

                            <button 
                                onClick={handlePrint}
                                className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg transition-all transform hover:-translate-y-1 active:scale-95"
                            >
                                <i data-lucide="printer"></i>
                                IMPRIMIR AGORA
                            </button>

                            <div className="pt-6 border-t mt-6">
                                <label className="flex items-center gap-2 text-xs text-blue-600 cursor-pointer hover:underline">
                                    <i data-lucide="image" size="14"></i>
                                    Alterar brasão temporariamente
                                    <input type="file" accept="image/*" className="file-input-hidden" onChange={handleLogoChange} />
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* Área do Documento - Ajustada para não transbordar */}
                    <div className="flex-1 flex justify-center p-4 lg:p-10 overflow-y-auto bg-slate-200 print:bg-white print:p-0">
                        <div className="print-area bg-white w-full max-w-[21cm] min-h-[29.7cm] shadow-2xl p-[1.5cm] lg:p-[2.5cm] text-black official-doc-font box-border">
                            
                            {/* Cabeçalho Institucional */}
                            <div className="flex items-center gap-6 mb-12">
                                <div className="crest-container shrink-0">
                                    <img 
                                        src={logo} 
                                        alt="Brasão" 
                                        className="crest-img" 
                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=BRASÃO'; }}
                                    />
                                </div>
                                <div className="text-[12pt] font-bold leading-tight uppercase">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            {/* Títulos */}
                            <div className="text-center mb-10">
                                <h1 className="text-[26pt] font-bold italic mb-8">Requerimento de Transferência</h1>
                                <h2 className="text-[13pt] font-normal uppercase tracking-widest mt-4">
                                    Escola Municipal Walda Miranda de Paiva
                                </h2>
                            </div>

                            {/* Nome do Aluno */}
                            <div className="mb-10 mt-14">
                                <div className="border-b border-black w-full min-h-[30px] flex items-end justify-center px-2 font-bold text-[14pt] uppercase">
                                    {formData.nomeAluno}
                                </div>
                                <span className="line-label-below uppercase">Nome do Aluno</span>
                            </div>

                            {/* Seção de Dados em LINHA ÚNICA (Ajustada para caber na tela/impressão) */}
                            <div className="flex items-center justify-between gap-x-2 mb-10 text-[11pt] w-full">
                                <div className="flex items-baseline whitespace-nowrap">
                                    <span className="mr-1">Ano:</span>
                                    <div className="border-b border-black w-[70px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.ano}
                                    </div>
                                </div>
                                <div className="flex items-baseline whitespace-nowrap">
                                    <span className="mr-1">Série:</span>
                                    <div className="border-b border-black w-[70px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {" "}
                                    </div>
                                </div>
                                <div className="flex items-baseline whitespace-nowrap">
                                    <span className="mr-1">Turma:</span>
                                    <div className="border-b border-black w-[50px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.turma}
                                    </div>
                                </div>
                                <div className="flex items-baseline flex-1 min-w-0 mx-2">
                                    <span className="mr-1">Turno:</span>
                                    <div className="border-b border-black flex-1 text-center font-bold uppercase min-h-[1.2rem] truncate px-1">
                                        {formData.turno}
                                    </div>
                                </div>
                                <div className="flex items-baseline whitespace-nowrap">
                                    <span className="mr-1">Ano Letivo:</span>
                                    <div className="border-b border-black w-[90px] text-center font-bold px-1 min-h-[1.2rem]">
                                        {formData.anoLetivo}
                                    </div>
                                </div>
                            </div>

                            {/* Professor(a) */}
                            <div className="flex items-baseline mb-16 text-[12pt]">
                                <span className="mr-2 whitespace-nowrap">Prof. (a):</span>
                                <div className="border-b border-black flex-grow font-bold px-2 uppercase min-h-[1.4rem]">
                                    {formData.professor}
                                </div>
                            </div>

                            {/* Mensagem Central */}
                            <div className="text-center font-bold text-[18pt] my-20 uppercase">
                                Requer sua Transferência
                            </div>

                            {/* Assinaturas e Datas */}
                            <div className="space-y-16">
                                <div className="flex gap-8 items-start">
                                    <div className="w-[180px] shrink-0">
                                        <div className="border-b border-black h-8 flex justify-between px-4 items-end font-bold text-lg">
                                            <span>/</span><span>/</span>
                                        </div>
                                        <span className="line-label-below uppercase">Data</span>
                                    </div>
                                    <div className="flex-grow">
                                        <div className="border-b border-black h-8"></div>
                                        <span className="line-label-below uppercase">Assinatura do Aluno ou Responsável</span>
                                    </div>
                                </div>

                                <div className="flex gap-8 items-start">
                                    <div className="w-[180px] shrink-0">
                                        <div className="border-b border-black h-8 flex justify-between px-4 items-end font-bold text-lg">
                                            <span>/</span><span>/</span>
                                        </div>
                                        <span className="line-label-below uppercase">Data</span>
                                    </div>
                                    <div className="flex-grow">
                                        <div className="border-b border-black h-8"></div>
                                        <span className="line-label-below uppercase">Recebi a Documentação</span>
                                    </div>
                                </div>

                                <div className="mt-24">
                                    <div className="border-b-2 border-black w-full h-8"></div>
                                    <span className="line-label-below uppercase text-[12pt]">Deferimento do Diretor / Secretário</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Ativa os ícones após a renderização
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
