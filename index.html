<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>
    <!-- Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para funcionar direto no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { 
                background: white !important; 
            }
            .no-print { 
                display: none !important; 
            }
            .print-area {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 1.5cm !important;
                width: 100% !important;
                max-width: none !important;
            }
        }

        .official-doc-font {
            font-family: Arial, sans-serif;
        }

        .line-label {
            font-size: 9pt;
            font-weight: bold;
            text-align: center;
            display: block;
            margin-top: 2px;
        }

        .crest-container {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .crest-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Esconde o input de arquivo mas mantém a funcionalidade se clicar na logo */
        .file-input-hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Define o caminho permanente do brasão no repositório
            const [logo, setLogo] = useState('./brasao.png');
            
            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                serie: '',
                turma: '',
                turno: '',
                anoLetivo: new Date().getFullYear().toString(),
                professor: '',
            });

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            // Permite trocar a logo se clicar nela (opcional)
            const handleLogoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogo(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePrint = () => {
                window.print();
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    {/* Sidebar de Formulário - Oculta na Impressão */}
                    <div className="no-print w-full lg:w-[400px] bg-white border-r border-slate-300 p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-8 text-blue-900 border-b pb-4">
                            <i data-lucide="file-edit"></i>
                            <h1 className="text-xl font-bold uppercase tracking-tight">Preenchimento</h1>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Nome Completo do Aluno</label>
                                <input 
                                    name="nomeAluno" 
                                    className="w-full p-2 border-2 border-slate-200 rounded focus:border-blue-500 outline-none uppercase font-semibold text-sm"
                                    onChange={handleChange}
                                    placeholder="Ex: JOÃO DA SILVA"
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ano</label>
                                    <input name="ano" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: 2024" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Série</label>
                                    <input name="serie" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: 5º" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turma</label>
                                    <input name="turma" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: B" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Turno</label>
                                    <input name="turno" className="w-full p-2 border-2 border-slate-200 rounded text-sm" onChange={handleChange} placeholder="Ex: Matutino" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Professor(a)</label>
                                <input name="professor" className="w-full p-2 border-2 border-slate-200 rounded text-sm uppercase" onChange={handleChange} />
                            </div>

                            <button 
                                onClick={handlePrint}
                                className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg transition-all transform hover:-translate-y-1 active:scale-95"
                            >
                                <i data-lucide="printer"></i>
                                IMPRIMIR REQUERIMENTO
                            </button>

                            <div className="pt-6 border-t mt-6">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-2">Configurações Avançadas</label>
                                <label className="flex items-center gap-2 text-xs text-blue-600 cursor-pointer hover:underline">
                                    <i data-lucide="image" size="14"></i>
                                    Alterar brasão temporariamente
                                    <input type="file" accept="image/*" className="file-input-hidden" onChange={handleLogoChange} />
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* Área do Documento */}
                    <div className="flex-1 flex justify-center p-4 lg:p-10 overflow-y-auto bg-slate-200 print:bg-white print:p-0">
                        <div className="print-area bg-white w-full max-w-[21cm] min-h-[29.7cm] shadow-2xl p-[1.5cm] lg:p-[2cm] text-black official-doc-font">
                            
                            {/* Cabeçalho */}
                            <div className="flex items-center gap-6 mb-10">
                                <div className="crest-container shrink-0">
                                    <img 
                                        src={logo} 
                                        alt="Brasão" 
                                        className="crest-img" 
                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=BRASÃO'; }}
                                    />
                                </div>
                                <div className="text-[12pt] font-bold leading-tight uppercase">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            {/* Títulos Principais */}
                            <div className="text-center mb-10">
                                <h1 className="text-[24pt] font-bold italic mb-6">Requerimento de Transferência</h1>
                                <h2 className="text-[12pt] font-normal uppercase tracking-[0.1em] border-b border-black inline-block pb-1">
                                    Escola Municipal Walda Miranda de Paiva
                                </h2>
                            </div>

                            {/* Conteúdo do Documento */}
                            <div className="mb-10">
                                <div className="border-b-2 border-black w-full min-h-[35px] flex items-end px-2 font-bold text-[14pt] uppercase">
                                    {formData.nomeAluno}
                                </div>
                                <span className="line-label uppercase">Nome do Aluno</span>
                            </div>

                            <div className="flex flex-wrap items-end gap-x-4 gap-y-8 mb-10 text-[11pt]">
                                <div className="flex-1 min-w-[100px]">
                                    <div className="border-b-2 border-black h-8 flex items-end justify-center font-bold">{formData.ano}</div>
                                    <span className="line-label uppercase">Ano</span>
                                </div>
                                <div className="flex-1 min-w-[100px]">
                                    <div className="border-b-2 border-black h-8 flex items-end justify-center font-bold">{formData.serie}</div>
                                    <span className="line-label uppercase">Série</span>
                                </div>
                                <div className="flex-1 min-w-[80px]">
                                    <div className="border-b-2 border-black h-8 flex items-end justify-center font-bold">{formData.turma}</div>
                                    <span className="line-label uppercase">Turma</span>
                                </div>
                                <div className="flex-[2] min-w-[150px]">
                                    <div className="border-b-2 border-black h-8 flex items-end justify-center font-bold uppercase">{formData.turno}</div>
                                    <span className="line-label uppercase">Turno</span>
                                </div>
                                <div className="flex-1 min-w-[100px]">
                                    <div className="border-b-2 border-black h-8 flex items-end justify-center font-bold">{formData.anoLetivo}</div>
                                    <span className="line-label uppercase">Ano Letivo</span>
                                </div>
                            </div>

                            <div className="mb-14">
                                <div className="border-b-2 border-black w-full h-8 flex items-end px-2 font-bold uppercase">
                                    {formData.professor}
                                </div>
                                <span className="line-label uppercase">Prof. (a)</span>
                            </div>

                            <div className="text-center font-bold text-[18pt] my-16 tracking-widest uppercase">
                                Requer sua Transferência
                            </div>

                            {/* Assinaturas */}
                            <div className="space-y-16">
                                <div className="flex gap-8 items-start">
                                    <div className="w-[180px]">
                                        <div className="border-b-2 border-black h-8 flex justify-between px-4 items-end font-bold text-lg">
                                            <span>/</span><span>/</span>
                                        </div>
                                        <span className="line-label uppercase">Data</span>
                                    </div>
                                    <div className="flex-grow">
                                        <div className="border-b-2 border-black h-8"></div>
                                        <span className="line-label uppercase">Assinatura do Aluno ou Responsável</span>
                                    </div>
                                </div>

                                <div className="flex gap-8 items-start">
                                    <div className="w-[180px]">
                                        <div className="border-b-2 border-black h-8 flex justify-between px-4 items-end font-bold text-lg">
                                            <span>/</span><span>/</span>
                                        </div>
                                        <span className="line-label uppercase">Data</span>
                                    </div>
                                    <div className="flex-grow">
                                        <div className="border-b-2 border-black h-8"></div>
                                        <span className="line-label uppercase">Recebi a Documentação</span>
                                    </div>
                                </div>

                                <div className="mt-20">
                                    <div className="border-b-2 border-black w-full h-10"></div>
                                    <span className="line-label uppercase text-[11pt]">Deferimento do Diretor / Secretário</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
