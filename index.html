<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            html,
            body {
                width: 210mm;
                min-height: 297mm;
                background: white !important;
            }

            .no-print {
                display: none !important;
            }

            .print-wrapper {
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                overflow: visible !important;
            }

            .print-area {
                width: 210mm !important;
                min-height: 297mm !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 15mm !important;
                box-shadow: none !important;
                border: none !important;
            }

            input {
                background: transparent !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            input::placeholder {
                color: transparent !important;
            }

            .date-picker-display {
                cursor: default !important;
            }
        }

        .official-doc-font {
            font-family: Arial, sans-serif;
        }

        .paper-size {
            width: 210mm;
            min-height: 297mm;
        }

        .crest-container {
            width: 115px;
            height: 115px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .crest-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .document-title {
            font-size: 26pt;
            font-weight: bold;
            font-style: italic;
            line-height: 1.1;
        }

        .school-name {
            font-size: 13pt;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .line-label-normal {
            font-size: 10pt;
            font-weight: normal;
            text-align: center;
            display: block;
            margin-top: 4px;
        }

        .line-label-14 {
            font-size: 14pt;
            font-weight: normal;
            text-align: center;
            display: block;
            margin-top: 4px;
        }

        .doc-input {
            background: transparent;
            border: none;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            color: black;
            vertical-align: bottom;
        }

        .doc-name-wrapper {
            position: relative;
        }

        .doc-name-input {
            width: 100%;
            height: 32px;
            font-size: 14pt;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid black;
            padding: 8px 4px 0 4px;
            line-height: 1;
        }

        .school-info {
            width: 100%;
            margin-bottom: 48px;
        }

        .school-info-line {
            display: grid;
            grid-template-columns: 36px 110px 55px 45px 56px 120px 88px 78px;
            align-items: end;
            column-gap: 5px;
            width: 100%;
            white-space: nowrap;
        }

        .info-label {
            font-size: 13.5pt;
            font-weight: normal;
            line-height: 1.6rem;
            white-space: nowrap;
        }

        .doc-small-input {
            width: 100%;
            height: 1.6rem;
            background: transparent;
            border: none;
            border-bottom: 1px solid black;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            font-size: 12.8pt;
            color: black;
            padding: 6px 3px 0 3px;
            line-height: 1;
            text-transform: uppercase;
            vertical-align: bottom;
        }

        .request-text {
            font-size: 18pt;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .signature-block {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            gap: 14px;
            width: 100%;
        }

        .date-side-wrapper {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding-top: 8px;
            white-space: nowrap;
        }

        .date-label {
            font-size: 14pt;
            text-transform: uppercase;
            font-weight: normal;
        }

        .date-picker-wrapper {
            position: relative;
            display: inline-block;
        }

        .date-picker-display {
            min-width: 128px;
            height: 32px;
            border-bottom: 1px solid black;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 14pt;
            font-weight: normal;
            color: black;
            padding: 0 8px 1px 8px;
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }

        .date-picker-display:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .date-display-part {
            display: inline-block;
            text-align: center;
            line-height: 1;
        }

        .date-display-day,
        .date-display-month {
            width: 30px;
        }

        .date-display-year {
            width: 50px;
        }

        .date-display-separator {
            display: inline-block;
            width: 8px;
            text-align: center;
            line-height: 1;
        }

        .date-empty-space {
            color: transparent;
        }

        .calendar-real-input {
            position: absolute;
            left: 0;
            top: 0;
            width: 128px;
            height: 32px;
            opacity: 0;
            pointer-events: none;
        }

        .sign-line-container {
            padding-top: 8px;
            width: 100%;
        }

        .doc-sign-input {
            width: 100%;
            height: 32px;
            background: transparent;
            border: none;
            border-bottom: 1px solid black;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            font-size: 13pt;
            color: black;
            padding: 8px 4px 0 4px;
            line-height: 1;
            vertical-align: bottom;
        }

        .suggestions-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
        }

        .doc-suggestions {
            top: 38px;
            left: 0;
            font-family: Inter, sans-serif;
            text-align: left;
        }

        .director-sign-img {
            max-height: 45px;
            object-fit: contain;
            margin-bottom: -15px;
        }

        .director-line {
            border-bottom: 1px solid black;
            width: 100%;
            height: 0;
        }

        @media screen and (max-width: 900px) {
            .paper-size {
                width: 100%;
                min-height: auto;
            }

            .school-info-line {
                grid-template-columns: 36px 110px 55px 45px 56px 120px 88px 78px;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const getTodayISODate = () => {
                const now = new Date();

                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');

                return `${year}-${month}-${day}`;
            };

            const getDateParts = (isoDate) => {
                if (!isoDate) {
                    return {
                        day: '',
                        month: '',
                        year: ''
                    };
                }

                const [year, month, day] = isoDate.split('-');

                return {
                    day: day || '',
                    month: month || '',
                    year: year || ''
                };
            };

            const normalizeText = (text) => {
                return text
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase()
                    .trim();
            };

            const requerimentoDateRef = useRef(null);
            const recebidoDateRef = useRef(null);

            const [logo] = useState('./brasao.png');
            const [csvData, setCsvData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [loadStatus, setLoadStatus] = useState('idle');

            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                turma: '',
                turno: '',
                anoLetivo: String(new Date().getFullYear()),

                dataRequerimento: getTodayISODate(),
                dataRecebido: '',

                assinaturaResponsavel: '',
                recebiDocumentacao: ''
            });

            useEffect(() => {
                const autoFetchCsv = async () => {
                    setLoadStatus('loading');

                    try {
                        const response = await fetch('./CUBO.CSV');

                        if (response.ok) {
                            const text = await response.text();
                            parseCsv(text);
                            setLoadStatus('success');
                        } else {
                            setLoadStatus('error');
                        }
                    } catch (err) {
                        setLoadStatus('error');
                    }
                };

                autoFetchCsv();
            }, []);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const parseCsv = (text) => {
                const lines = text.split(/\r?\n/);
                const result = [];
                const startIdx = lines[0]?.toLowerCase().includes('aluno') ? 1 : 0;

                for (let i = startIdx; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;

                    const columns = lines[i].split(';');

                    if (columns.length >= 4) {
                        result.push({
                            nome: columns[0].trim().toUpperCase(),
                            ano: columns[1].trim().toUpperCase(),
                            turma: columns[2].trim().toUpperCase(),
                            turno: columns[3].trim().toUpperCase()
                        });
                    }
                }

                result.sort((a, b) => {
                    return a.nome.localeCompare(b.nome, 'pt-BR');
                });

                setCsvData(result);
            };

            const handleTextChange = (e) => {
                const { name, value } = e.target;

                let newValue = value;

                if (
                    name === 'nomeAluno' ||
                    name === 'ano' ||
                    name === 'turma' ||
                    name === 'turno'
                ) {
                    newValue = value.toUpperCase();
                }

                setFormData({
                    ...formData,
                    [name]: newValue
                });

                if (name === 'nomeAluno') {
                    setSearchTerm(newValue);
                    setShowSuggestions(true);
                }
            };

            const handleDateChange = (e) => {
                const { name, value } = e.target;

                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            const openCalendar = (ref) => {
                if (!ref.current) return;

                if (typeof ref.current.showPicker === 'function') {
                    ref.current.showPicker();
                } else {
                    ref.current.focus();
                    ref.current.click();
                }
            };

            const handleCalendarKeyDown = (e, ref) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openCalendar(ref);
                }
            };

            const handleCsvUploadManual = (e) => {
                const file = e.target.files[0];

                if (file) {
                    const reader = new FileReader();

                    reader.onload = (event) => {
                        parseCsv(event.target.result);
                        setLoadStatus('success');
                    };

                    reader.readAsText(file);
                }
            };

            const selectStudent = (student) => {
                setFormData({
                    ...formData,
                    nomeAluno: student.nome,
                    ano: student.ano,
                    turma: student.turma,
                    turno: student.turno
                });

                setSearchTerm(student.nome);
                setShowSuggestions(false);
            };

            const clearForm = () => {
                setFormData({
                    nomeAluno: '',
                    ano: '',
                    turma: '',
                    turno: '',
                    anoLetivo: String(new Date().getFullYear()),

                    dataRequerimento: getTodayISODate(),
                    dataRecebido: '',

                    assinaturaResponsavel: '',
                    recebiDocumentacao: ''
                });

                setSearchTerm('');
                setShowSuggestions(false);
            };

            const handlePrint = () => {
                setShowSuggestions(false);

                setTimeout(() => {
                    window.print();
                }, 100);
            };

            const filteredStudents = csvData
                .filter((student) => {
                    const nome = normalizeText(student.nome);
                    const termo = normalizeText(searchTerm);

                    if (!termo) return false;

                    if (termo.length === 1) {
                        return nome.startsWith(termo);
                    }

                    return nome.startsWith(termo) || nome.includes(termo);
                })
                .sort((a, b) => {
                    const nomeA = normalizeText(a.nome);
                    const nomeB = normalizeText(b.nome);
                    const termo = normalizeText(searchTerm);

                    const aComeca = nomeA.startsWith(termo);
                    const bComeca = nomeB.startsWith(termo);

                    if (aComeca && !bComeca) return -1;
                    if (!aComeca && bComeca) return 1;

                    return a.nome.localeCompare(b.nome, 'pt-BR');
                })
                .slice(0, 15);

            const renderSuggestions = () => {
                if (!showSuggestions || !searchTerm || csvData.length === 0) {
                    return null;
                }

                return (
                    <div className="suggestions-list doc-suggestions no-print">
                        {filteredStudents.length > 0 ? (
                            filteredStudents.map((student, index) => (
                                <div
                                    key={index}
                                    className="p-3 hover:bg-blue-600 hover:text-white cursor-pointer border-b last:border-0 text-sm font-bold uppercase"
                                    onClick={() => selectStudent(student)}
                                >
                                    {student.nome}
                                    <span className="text-[10px] opacity-70">
                                        {' '}({student.ano} {student.turma} - {student.turno})
                                    </span>
                                </div>
                            ))
                        ) : (
                            <div className="p-3 text-sm text-slate-500 text-center">
                                Nenhum aluno encontrado
                            </div>
                        )}
                    </div>
                );
            };

            const renderDatePicker = (name, ref) => {
                const parts = getDateParts(formData[name]);

                return (
                    <div className="date-picker-wrapper">
                        <div
                            className="date-picker-display"
                            onClick={() => openCalendar(ref)}
                            onKeyDown={(e) => handleCalendarKeyDown(e, ref)}
                            role="button"
                            tabIndex="0"
                            title="Clique para escolher a data"
                        >
                            <span className={`date-display-part date-display-day ${parts.day ? '' : 'date-empty-space'}`}>
                                {parts.day || '00'}
                            </span>

                            <span className="date-display-separator">/</span>

                            <span className={`date-display-part date-display-month ${parts.month ? '' : 'date-empty-space'}`}>
                                {parts.month || '00'}
                            </span>

                            <span className="date-display-separator">/</span>

                            <span className={`date-display-part date-display-year ${parts.year ? '' : 'date-empty-space'}`}>
                                {parts.year || '0000'}
                            </span>
                        </div>

                        <input
                            ref={ref}
                            type="date"
                            name={name}
                            className="calendar-real-input"
                            value={formData[name]}
                            onChange={handleDateChange}
                            tabIndex="-1"
                        />
                    </div>
                );
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">

                    <div className="no-print w-full lg:w-[360px] bg-white border-r border-slate-300 p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-8 text-blue-900 border-b pb-4">
                            <i data-lucide="file-text"></i>
                            <h1 className="text-xl font-bold uppercase tracking-tight">
                                Requerimento
                            </h1>
                        </div>

                        <div className="space-y-4">
                            {loadStatus === 'success' ? (
                                <div className="flex items-center gap-2 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm font-semibold">
                                    <i data-lucide="check-circle" size="18"></i>
                                    {csvData.length} alunos carregados.
                                </div>
                            ) : (
                                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 text-sm text-center">
                                    <p className="mb-2 font-semibold">
                                        CUBO.CSV não carregado automaticamente.
                                    </p>

                                    <label className="text-blue-600 underline cursor-pointer font-bold">
                                        Carregar CUBO.CSV manualmente
                                        <input
                                            type="file"
                                            className="hidden"
                                            accept=".csv"
                                            onChange={handleCsvUploadManual}
                                        />
                                    </label>
                                </div>
                            )}

                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-900 text-sm leading-relaxed">
                                <p className="font-bold mb-1">
                                    Como preencher:
                                </p>

                                <p>
                                    Clique direto nas linhas da folha. Para corrigir datas, clique na data e escolha pelo calendário.
                                </p>
                            </div>

                            <button
                                onClick={handlePrint}
                                className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg"
                            >
                                <i data-lucide="printer"></i>
                                IMPRIMIR
                            </button>

                            <button
                                onClick={clearForm}
                                className="w-full bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3 rounded-lg flex items-center justify-center gap-2"
                            >
                                <i data-lucide="eraser"></i>
                                LIMPAR FOLHA
                            </button>
                        </div>
                    </div>

                    <div className="print-wrapper flex-1 flex justify-center p-4 lg:p-8 overflow-y-auto bg-slate-200">
                        <div className="print-area paper-size bg-white shadow-2xl p-[18mm] text-black official-doc-font">

                            <div className="flex items-center justify-start gap-8 mb-8">
                                <div className="crest-container">
                                    <img
                                        src={logo}
                                        alt="Brasão"
                                        className="crest-img"
                                        onError={(e) => {
                                            e.target.src = 'https://via.placeholder.com/120?text=BRASÃO';
                                        }}
                                    />
                                </div>

                                <div className="text-[16pt] font-bold leading-tight uppercase text-left">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            <div className="text-center mb-10">
                                <h1 className="document-title mb-8">
                                    Requerimento de Transferência
                                </h1>

                                <h2 className="school-name mt-8">
                                    Escola Municipal Walda Miranda de Paiva
                                </h2>
                            </div>

                            <div className="mb-10 mt-14 doc-name-wrapper">
                                <input
                                    name="nomeAluno"
                                    className="doc-input doc-name-input"
                                    value={formData.nomeAluno}
                                    onChange={handleTextChange}
                                    onFocus={() => {
                                        if (formData.nomeAluno) {
                                            setSearchTerm(formData.nomeAluno);
                                            setShowSuggestions(true);
                                        }
                                    }}
                                    autoComplete="off"
                                />

                                {renderSuggestions()}

                                <span className="line-label-14 uppercase">
                                    Nome do Aluno
                                </span>
                            </div>

                            <div className="school-info">
                                <div className="school-info-line">
                                    <span className="info-label">Ano:</span>

                                    <input
                                        name="ano"
                                        className="doc-small-input"
                                        value={formData.ano}
                                        onChange={handleTextChange}
                                    />

                                    <span className="info-label">Turma:</span>

                                    <input
                                        name="turma"
                                        className="doc-small-input"
                                        value={formData.turma}
                                        onChange={handleTextChange}
                                    />

                                    <span className="info-label">Turno:</span>

                                    <input
                                        name="turno"
                                        className="doc-small-input"
                                        value={formData.turno}
                                        onChange={handleTextChange}
                                    />

                                    <span className="info-label">Ano Letivo:</span>

                                    <input
                                        name="anoLetivo"
                                        className="doc-small-input"
                                        value={formData.anoLetivo}
                                        onChange={handleTextChange}
                                    />
                                </div>
                            </div>

                            <div className="request-text mb-12">
                                Requer sua Transferência
                            </div>

                            <div className="space-y-16">
                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="date-label">
                                            Data:
                                        </span>

                                        {renderDatePicker('dataRequerimento', requerimentoDateRef)}
                                    </div>

                                    <div className="sign-line-container">
                                        <input
                                            name="assinaturaResponsavel"
                                            className="doc-sign-input"
                                            value={formData.assinaturaResponsavel}
                                            onChange={handleTextChange}
                                        />

                                        <span className="line-label-14 uppercase">
                                            Assinatura do Aluno ou Responsável
                                        </span>
                                    </div>
                                </div>

                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="date-label">
                                            Data:
                                        </span>

                                        {renderDatePicker('dataRecebido', recebidoDateRef)}
                                    </div>

                                    <div className="sign-line-container">
                                        <input
                                            name="recebiDocumentacao"
                                            className="doc-sign-input"
                                            value={formData.recebiDocumentacao}
                                            onChange={handleTextChange}
                                        />

                                        <span className="line-label-14 uppercase">
                                            Recebi a Documentação
                                        </span>
                                    </div>
                                </div>

                                <div className="mt-24 text-center flex flex-col items-center">
                                    <img
                                        src="./assinatura.png"
                                        alt="Assinatura"
                                        className="director-sign-img"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                        }}
                                    />

                                    <div className="director-line"></div>

                                    <span className="line-label-normal uppercase text-[14pt]">
                                        Deferimento do Diretor / Secretário
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
